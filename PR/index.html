<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaibhav Bangar — Software Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1220;
    --bg-alt:#0F1830;
    --panel:#111B32;
    --rule:#22304F;
    --text:#EAF0FB;
    --text-soft:#9FAFC7;
    --text-faint:#6B7A96;
    --accent:#38BDF8;
    --accent2:#818CF8;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Poppins',sans-serif;}
  a{color:var(--accent);text-decoration:none;}
  ::selection{background:rgba(56,189,248,0.25);}
  a:focus-visible, button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}

  .wrap{max-width:1180px;margin:0 auto;padding:0 32px;}

  /* NAV */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(11,18,32,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--rule);
  }
  .nav-inner{
    max-width:1180px;margin:0 auto;padding:20px 32px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{
    font-family:'Poppins',sans-serif;font-weight:700;font-size:22px;color:#fff;
  }
  .logo .dot{color:var(--accent);}
  nav.menu{display:flex;gap:38px;}
  nav.menu a{
    color:var(--text-soft);font-weight:500;font-size:15px;
    transition:color .15s ease;
  }
  nav.menu a:hover{color:#fff;}
  .nav-toggle{display:none;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}

  @media (max-width:800px){
    nav.menu{
      position:fixed;top:68px;left:0;right:0;
      background:var(--bg-alt);
      flex-direction:column;gap:0;
      border-bottom:1px solid var(--rule);
      max-height:0;overflow:hidden;
      transition:max-height .25s ease;
    }
    nav.menu.open{max-height:300px;}
    nav.menu a{padding:16px 32px;border-bottom:1px solid var(--rule);}
    .nav-toggle{display:block;}
  }

  /* HERO */
  .hero{padding:90px 0 70px;}
  .hero-grid{
    display:grid;grid-template-columns:1.15fr 0.85fr;
    gap:40px;align-items:center;
  }
  .eyebrow{
    font-weight:600;color:var(--text-soft);font-size:18px;margin:0 0 6px;
  }
  .hero h1{
    font-size:56px;font-weight:800;color:#fff;margin:0 0 14px;line-height:1.08;
  }
  .role{
    color:var(--accent);font-weight:700;font-size:22px;margin:0 0 20px;
  }
  .hero p.bio{
    color:var(--text-soft);font-size:16.5px;max-width:520px;margin:0 0 32px;
  }
  .btn-row{display:flex;gap:16px;flex-wrap:wrap;}
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:15px;
    padding:14px 26px;border-radius:8px;
    cursor:pointer;transition:transform .15s ease, background .15s ease, color .15s ease;
    display:inline-block;
  }
  .btn-solid{background:var(--accent);color:#04121F;border:1px solid var(--accent);}
  .btn-solid:hover{transform:translateY(-2px);background:#5cc9fa;}
  .btn-outline{background:transparent;color:#fff;border:1px solid var(--accent);}
  .btn-outline:hover{transform:translateY(-2px);background:rgba(56,189,248,0.1);}

  .avatar-wrap{display:flex;justify-content:center;}
  .avatar-ring{
    width:360px;height:360px;border-radius:50%;
    border:4px solid var(--accent);
    padding:10px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 1px rgba(56,189,248,0.15), 0 25px 60px -20px rgba(56,189,248,0.35);
  }
  .avatar-inner{
    width:100%;height:100%;border-radius:50%;
    background:linear-gradient(155deg,#1a2542,#0d1526);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .avatar-inner span{
    font-family:'Poppins',sans-serif;font-weight:800;font-size:76px;color:var(--accent);
  }
  .avatar-inner img, .about-photo img{
    width:100%;height:100%;object-fit:cover;
  }
  @media (max-width:800px){
    .hero-grid{grid-template-columns:1fr;text-align:center;}
    .hero p.bio{margin-left:auto;margin-right:auto;}
    .btn-row{justify-content:center;}
    .avatar-wrap{order:-1;margin-bottom:10px;}
    .avatar-ring{width:220px;height:220px;}
    .avatar-inner span{font-size:48px;}
    .hero h1{font-size:38px;}
  }

  /* SECTIONS */
  section{padding:80px 0;border-top:1px solid var(--rule);}
  .sec-title{
    font-size:32px;font-weight:700;color:#fff;margin:0 0 6px;text-align:center;
  }
  .sec-sub{
    text-align:center;color:var(--text-soft);font-size:15px;margin:0 0 48px;
  }
  .sec-sub .accent{color:var(--accent);}

  /* ABOUT */
  .about-grid{
    display:grid;grid-template-columns:1fr 1.3fr;gap:50px;align-items:center;
  }
  .about-card{
    background:var(--panel);border:1px solid var(--rule);border-radius:var(--radius);
    padding:36px;
  }
  .about-card p{color:var(--text-soft);margin:0 0 16px;font-size:15.5px;}
  .about-card strong{color:#fff;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px;}
  .stat{
    background:var(--bg-alt);border:1px solid var(--rule);border-radius:10px;
    padding:16px;text-align:center;
  }
  .stat b{display:block;color:var(--accent);font-size:22px;font-family:'Poppins',sans-serif;}
  .stat span{font-size:12px;color:var(--text-faint);}
  .about-photo{
    width:100%;aspect-ratio:1/1;border-radius:var(--radius);
    background:linear-gradient(155deg,#1a2542,#0d1526);
    border:1px solid var(--rule);
    display:flex;align-items:center;justify-content:center;
  }
  .about-photo span{font-family:'Poppins',sans-serif;font-weight:800;font-size:64px;color:var(--accent);}
  @media (max-width:800px){.about-grid{grid-template-columns:1fr;}.stat-grid{grid-template-columns:1fr 1fr;}}

  /* SKILLS */
  .skills-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
  }
  .skill-card{
    background:var(--panel);border:1px solid var(--rule);border-radius:var(--radius);
    padding:24px;
  }
  .skill-card h3{margin:0 0 14px;font-size:16px;color:var(--accent);}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    background:var(--bg-alt);border:1px solid var(--rule);color:var(--text-soft);
    font-size:12.5px;padding:6px 12px;border-radius:20px;
  }
  @media (max-width:800px){.skills-grid{grid-template-columns:1fr;}}

  /* PROJECTS */
  .proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
  .proj-card{
    background:var(--panel);border:1px solid var(--rule);border-radius:var(--radius);
    padding:26px;display:flex;flex-direction:column;
    transition:transform .2s ease, border-color .2s ease;
  }
  .proj-card:hover{transform:translateY(-4px);border-color:var(--accent);}
  .proj-card h3{color:#fff;font-size:18px;margin:0 0 10px;}
  .proj-card ul{color:var(--text-soft);font-size:14px;margin:0 0 16px;padding-left:18px;flex:1;}
  .proj-card li{margin-bottom:6px;}
  .tag-row{display:flex;flex-wrap:wrap;gap:8px;}
  .ptag{background:rgba(56,189,248,0.12);color:var(--accent);font-size:11.5px;padding:5px 10px;border-radius:6px;}
  @media (max-width:900px){.proj-grid{grid-template-columns:1fr;}}

  /* RESUME */
  .resume-card{
    background:var(--panel);border:1px solid var(--rule);border-radius:var(--radius);
    padding:40px;text-align:center;
    max-width:560px;margin:0 auto;
  }
  .resume-card p{color:var(--text-soft);margin:8px 0 24px;}

  /* CONTACT */
  .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:0 auto;}
  .contact-card{
    background:var(--panel);border:1px solid var(--rule);border-radius:var(--radius);
    padding:26px;text-align:center;
  }
  .contact-card .lbl{color:var(--text-faint);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .contact-card a, .contact-card span{color:#fff;font-weight:600;font-size:15px;}
  @media (max-width:800px){.contact-grid{grid-template-columns:1fr;}}

  footer{
    padding:30px 0;border-top:1px solid var(--rule);
    text-align:center;color:var(--text-faint);font-size:13px;
  }
  footer a{color:var(--text-faint);}
  footer a:hover{color:var(--accent);}
</style>
</head>

</header>
